name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true
          cache-suffix: ${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Sync frozen environment
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Ruff formatting
        run: uv run --frozen ruff format --check .

      - name: Ruff lint
        run: uv run --frozen ruff check .

      - name: Type checking
        run: uv run --frozen mypy src tests

      - name: Tests and secret scan
        run: uv run --frozen pytest

      - name: Export schemas
        run: uv run --frozen bbbench schema export --output .ci-schemas

      - name: Validate smoke suite
        run: uv run --frozen bbbench suite validate suites/smoke-v1.yaml

      - name: Validate core suite
        run: uv run --frozen bbbench suite validate suites/core-v1.yaml

      - name: Validate ladder suite
        run: uv run --frozen bbbench suite validate suites/ladder-v1.yaml

      - name: Build distributions
        run: uv build
