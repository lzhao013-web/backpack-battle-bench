    display_name: 战旗
    count: 1
    shape: [[0, 0], [0, 1]]
    rotations: [0, 90]
    category: support
    effects:
      - type: ray_stat_bonus
        config:
          direction: [-1, 0]
          target_category: weapon
          stat: attack
          amount: 3
          once_per_target: true
          blocked: false
